<ion-content class="ion-padding" [fullscreen]="true">
    <div class="limited-container">
        <div class="settings-wrapper">
            <div class="title-section">
                <h3>Configuración</h3>
            </div>
            <div class="settings-body">
                <div class="profile-card" (click)="editProfile()">
                    <div class="profile-avatar">
                        <ion-icon name="person-circle-outline" class="avatar-icon"></ion-icon>
                    </div>
                    <div class="profile-info">
                        <p class="profile-name">{{ userName }}</p>
                        <p class="profile-email">{{ userEmail }}</p>
                        <p class="profile-since">Miembro desde {{ memberSince }}</p>
                    </div>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2">
                        <path d="M9 5l7 7-7 7" />
                    </svg>
                </div>

                <div class="settings-section" *ngFor="let section of settingsSections">
                    <p class="section-title">{{ section.title }}</p>
                    <div class="section-list">
                        <div class="section-item" *ngFor="let item of section.items; let idx = index"
                            [class.item-last]="idx === section.items.length - 1" (click)="onSettingTap(item)">
                            <div class="item-icon" [style.backgroundColor]="item.iconBg">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                                    [attr.stroke]="item.iconColor" stroke-width="1.8">
                                    <path [attr.d]="item.icon" />
                                </svg>
                            </div>
                            <div class="item-content">
                                <p class="item-label" [class.label-danger]="item.danger">{{ item.label }}</p>
                            </div>
                            <div class="item-right" *ngIf="!item.toggle">
                                <span class="item-value" *ngIf="item.value">{{ item.value }}</span>
                                <svg *ngIf="item.click" class="item-chevron" width="16" height="16" viewBox="0 0 24 24"
                                    fill="none" stroke="#94A3B8" stroke-width="2">
                                    <path d="M9 5l7 7-7 7" />
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>

                <button class="logout-btn" (click)="logout()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                    <span>Cerrar Sesión</span>
                </button>
                <div class="version-label"><span>My Finance App v1.0.0</span></div>
            </div>
        </div>
    </div>
</ion-content>
