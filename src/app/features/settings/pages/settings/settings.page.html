<ion-content class="ion-padding has-bottom-tabs">
    <div class="limited-container">
        <div class="settings-wrapper">
            <div class="title-section">
                <h3>Configuración</h3>
            </div>
            <div class="settings-body">
                <div class="profile-card" (click)="editProfile()">
                    <div class="profile-avatar">
                        <ion-icon name="person-circle-outline" class="avatar-icon"></ion-icon>
                    </div>
                    <div class="profile-info">
                        <p class="profile-name">{{ userName }}</p>
                        <p class="profile-email">{{ userEmail }}</p>
                        <p class="profile-since">Miembro desde {{ memberSince }}</p>
                    </div>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2">
                        <path d="M9 5l7 7-7 7" />
                    </svg>
                </div>

                <div class="settings-section" *ngFor="let section of settingsSections">
                    <p class="section-title">{{ section.title }}</p>
                    <div class="section-list">
                        <div class="section-item" *ngFor="let item of section.items; let idx = index"
                            [class.item-last]="idx === section.items.length - 1" (click)="onSettingTap(item)">
                            <div class="item-icon" [style.backgroundColor]="item.iconBg">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                                    [attr.stroke]="item.iconColor" stroke-width="1.8">
                                    <path [attr.d]="item.icon" />
                                </svg>
                            </div>
                            <div class="item-content">
                                <p class="item-label" [class.label-danger]="item.danger">{{ item.label }}</p>
                            </div>
                            <div class="item-right" *ngIf="!item.toggle">
                                <span class="item-value" *ngIf="item.value">{{ item.value }}</span>
                                <svg *ngIf="item.click" class="item-chevron" width="16" height="16" viewBox="0 0 24 24"
                                    fill="none" stroke="#94A3B8" stroke-width="2">
                                    <path d="M9 5l7 7-7 7" />
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>

                <button class="logout-btn" (click)="logout()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                    <span>Cerrar Sesión</span>
                </button>
                <div class="version-label"><span>My Finance App v1.0.0</span></div>
            </div>
        </div>
    </div>

    <ion-tab-bar class="dashboard-tab-bar" slot="bottom">
    <ion-tab-button (click)="goToDashboard()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.8">
            <path
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg><span>Inicio</span></ion-tab-button>
    <ion-tab-button (click)="goToIncome()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.8">
            <path d="M12 4v16m8-8H4" />
        </svg><span>Ingresos</span></ion-tab-button>
    <ion-tab-button (click)="goToExpense()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.8">
            <path d="M20 12H4" />
        </svg><span>Gastos</span></ion-tab-button>
    <ion-tab-button (click)="goToCategories()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.8">
            <path
                d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
        </svg><span>Categorías</span></ion-tab-button>
    <ion-tab-button (click)="goToSettings()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.8">
            <path
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <circle cx="12" cy="12" r="3" />
        </svg><span>Más</span></ion-tab-button>
    </ion-tab-bar>
</ion-content>
