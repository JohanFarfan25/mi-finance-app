<ion-content class="login-content">
  <div class="login-wrapper">
    <div class="login-inner">
      <div class="login-logo-section">
        <div class="login-logo-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2">
            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6" />
          </svg>
        </div>
        <h1 class="login-title">My Finance</h1>
        <p class="login-subtitle">Gestión financiera personal</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <div class="login-field">
          <label class="login-label">Usuario</label>
          <div class="login-input-wrapper" [class.input-focused]="usuarioFocused">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94A3B8">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <input type="text" class="login-input" placeholder="Ingresa tu usuario" formControlName="usuario"
                   autocomplete="username" (focus)="usuarioFocused = true" (blur)="usuarioFocused = false" />
          </div>
        </div>

        <div class="login-field">
          <label class="login-label">PIN / Contraseña</label>
          <div class="login-input-wrapper" [class.input-focused]="pinFocused">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94A3B8">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0110 0v4" />
            </svg>
            <input [type]="showPassword ? 'text' : 'password'" class="login-input" placeholder="••••••"
                   formControlName="pin" inputmode="numeric" autocomplete="current-password"
                   (focus)="pinFocused = true" (blur)="pinFocused = false" />
            <button type="button" class="login-toggle-pin" (click)="togglePinVisibility()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94A3B8">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <div class="login-error" *ngIf="showError">
          <span>Usuario o contraseña incorrectos</span>
        </div>

        <button type="submit" class="login-btn-primary" [disabled]="loginForm.invalid">Ingresar</button>
      </form>

      <div class="login-register-link">
        <p>¿Nuevo aquí? <span class="login-link" (click)="goToRegister()">Crear perfil local</span></p>
      </div>

      <div class="login-offline">
        <div class="login-offline-dot"></div>
        <span>Modo offline disponible</span>
      </div>
    </div>
  </div>
</ion-content>
