<ion-header>
    <ion-toolbar>
        <ion-buttons slot="start">
            <ion-menu-button></ion-menu-button>
        </ion-buttons>
        <ion-title>Categorías</ion-title>
        <ion-buttons slot="end">
            <ion-button (click)="openSearch()">
                <ion-icon name="search-outline"></ion-icon>
            </ion-button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
    <div class="limited-container">
        <div class="categories-grid">
            <div class="category-card" *ngFor="let cat of categories">
                <div class="category-icon" [style.backgroundColor]="cat.backgroundColor">
                    <ion-icon [name]="cat.icon" [style.color]="cat.color"></ion-icon>
                </div>
                <p class="category-name">{{ cat.name }}</p>
                <p class="category-count">{{ cat.transactionCount }} transacciones</p>
                <p class="category-total" [style.color]="cat.color">{{ cat.totalAmount |
                    currency:currencyCode:'symbol':'1.0-0' }}</p>
                <div class="category-actions">
                    <ion-button fill="clear" size="small" (click)="editCategory(cat)">
                        <ion-icon name="create-outline"></ion-icon>
                    </ion-button>
                    <ion-button fill="clear" size="small" color="danger" (click)="deleteCategory(cat.id)">
                        <ion-icon name="trash-outline"></ion-icon>
                    </ion-button>
                    <ion-button fill="clear" size="small" (click)="viewCategory(cat)">
                        <ion-icon name="eye-outline"></ion-icon>
                    </ion-button>
                </div>
            </div>
        </div>
    </div>
</ion-content>

<ion-tab-bar class="dashboard-tab-bar" slot="bottom">
    <ion-tab-button (click)="goToDashboard()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg><span>Inicio</span>
    </ion-tab-button>
    <ion-tab-button (click)="goToIncome()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M12 4v16m8-8H4" />
        </svg><span>Ingresos</span>
    </ion-tab-button>
    <ion-tab-button (click)="goToExpense()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M20 12H4" />
        </svg><span>Gastos</span>
    </ion-tab-button>
    <ion-tab-button (click)="goToCategories()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path
                d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
        </svg><span>Categorías</span>
    </ion-tab-button>
    <ion-tab-button (click)="goToSettings()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <circle cx="12" cy="12" r="3" />
        </svg><span>Más</span>
    </ion-tab-button>
</ion-tab-bar>

<ion-fab class="custom-fab" slot="fixed" (click)="createCategory()">
    <ion-fab-button>
        <ion-icon name="add"></ion-icon>
    </ion-fab-button>
</ion-fab>
