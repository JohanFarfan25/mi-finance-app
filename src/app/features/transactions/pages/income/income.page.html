<ion-content class="ion-padding" [fullscreen]="true">
    <div class="limited-container">
        <div class="title-section">
            <h3>Nuevo Ingreso</h3>
        </div>
        <div class="income-wrapper">
            <div class="income-body">
                <div class="income-amount-section">
                    <p class="income-section-label">Monto</p>
                    <div class="income-amount-display">
                        <span class="income-currency">$</span>
                        <span class="income-amount-value">{{ formattedAmount }}</span>
                    </div>
                    <input type="number" class="income-amount-input" [(ngModel)]="amount" (input)="formatAmount()"
                        placeholder="0" inputmode="numeric" />
                    <div class="income-amount-line"></div>
                </div>

                <div class="income-field">
                    <label class="income-label">Categoría</label>
                    <div class="income-select-wrapper" (click)="showCategoryPicker()">
                        <div class="income-select-left">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94A3B8"
                                stroke-width="2">
                                <path d="M4 6h16M4 10h16M4 14h16M4 18h16" />
                            </svg>
                            <span class="income-select-text" [class.text-filled]="selectedCategoryName">
                                {{ selectedCategoryName || 'Seleccionar categoría' }}
                            </span>
                        </div>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2">
                            <path d="M19 9l-7 7-7-7" />
                        </svg>
                    </div>
                    <div class="income-chips">
                        <div class="income-chip" *ngFor="let cat of incomeCategories"
                            [class.chip-selected]="selectedCategoryId === cat.id"
                            (click)="selectCategory(cat.id, cat.name)">
                            <ion-icon [name]="cat.icon" style="font-size: 14px;" [style.color]="cat.color"></ion-icon>
                            <span class="income-chip-text">{{ cat.name }}</span>
                        </div>
                    </div>
                </div>

                <div class="income-field">
                    <label class="income-label">Fecha</label>
                    <div class="income-select-wrapper" (click)="openDatePicker()">
                        <div class="income-select-left">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2563EB"
                                stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                                <line x1="16" y1="2" x2="16" y2="6" />
                                <line x1="8" y1="2" x2="8" y2="6" />
                                <line x1="3" y1="10" x2="21" y2="10" />
                            </svg>
                            <span class="income-select-text text-filled">{{ formattedDate }}</span>
                        </div>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2">
                            <path d="M19 9l-7 7-7-7" />
                        </svg>
                    </div>
                </div>

                <div class="income-field">
                    <label class="income-label">Descripción</label>
                    <textarea class="income-textarea" [(ngModel)]="description"
                        placeholder="Agregar notas sobre este ingreso..." rows="3"></textarea>
                </div>

                <div class="income-toggle-card">
                    <div class="income-toggle-info">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2">
                            <polyline points="23 4 23 10 17 10" />
                            <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10" />
                        </svg>
                        <div>
                            <p class="income-toggle-title">Ingreso recurrente</p>
                            <p class="income-toggle-subtitle">Se repite cada mes</p>
                        </div>
                    </div>
                    <button class="income-toggle" [class.toggle-active]="isRecurring"
                        (click)="isRecurring = !isRecurring">
                        <div class="income-toggle-knob"></div>
                    </button>
                </div>

                <button class="income-save-btn" (click)="saveIncome()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2">
                        <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" />
                        <polyline points="17 21 17 13 7 13 7 21" />
                        <polyline points="7 3 7 8 15 8" />
                    </svg>
                    Guardar Ingreso
                </button>
            </div>
        </div>
    </div>
</ion-content>
